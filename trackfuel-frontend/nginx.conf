server {
  listen 8087;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # ── Reverse-proxy API calls to the backend container ──────────
  location /api/ {
    proxy_pass         http://app:8086;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;

    # Allow large file uploads (fuel receipt photos, etc.)
    client_max_body_size 20M;
  }

  # ── Reverse-proxy uploaded files served by the backend ────────
  location /uploads/ {
    proxy_pass         http://app:8086;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
  }

  # ── Proxy bootstrap & health endpoints ────────────────────────
  location /bootstrap {
    proxy_pass         http://app:8086;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
  }

  location /health {
    proxy_pass         http://app:8086;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
  }

  # ── Static assets with long-term cache ────────────────────────
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # ── SPA fallback (React Router) ──────────────────────────────
  location / {
    try_files $uri $uri/ /index.html;
  }
}
